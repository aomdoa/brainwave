openapi: 3.0.0
info:
  title: Brainwave Thoughts API
  version: 1.1.0
  description: |
    The Thoughts API allows authenticated users to create, read, update, delete,
    search, and manage tags on their thoughts.

tags:
  - name: Thoughts
    description: Operations related to user thoughts and their tags

paths:
  /thoughts/config:
    get:
      tags: [Thoughts]
      summary: Get thought configuration
      description: Returns validation configuration for thoughts.
      responses:
        '200':
          description: Thought configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  minTitleLength:
                    type: integer
                  maxTitleLength:
                    type: integer
                  minBodyLength:
                    type: integer
                  maxBodyLength:
                    type: integer

  /thoughts:
    post:
      tags: [Thoughts]
      summary: Create a new thought
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateThought'
      responses:
        '200':
          description: The newly created thought
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thought'
        '401':
          description: Unauthorized

    get:
      tags: [Thoughts]
      summary: Search thoughts
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string

        - name: filter
          in: query
          schema:
            type: string

        - name: tagId
          in: query
          description: Filter thoughts by tag IDs (repeat parameter for multiple)
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true

        - name: orderBy
          in: query
          schema:
            type: string
            default: updatedAt:desc

        - name: page
          in: query
          schema:
            type: integer
            default: 1

        - name: size
          in: query
          schema:
            type: integer
            default: 25

      responses:
        '200':
          description: Paginated list of thoughts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Thought'
                  page:
                    type: object
                    properties:
                      current:
                        type: integer
                      totalPages:
                        type: integer
                  links:
                    type: object
                    additionalProperties:
                      type: string
        '401':
          description: Unauthorized

  /thoughts/{id}:
    get:
      tags: [Thoughts]
      summary: Get a single thought
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Thought object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thought'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    patch:
      tags: [Thoughts]
      summary: Update a thought
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThought'
      responses:
        '200':
          description: Updated thought
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thought'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      tags: [Thoughts]
      summary: Delete a thought
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted thought
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thought'
        '401':
          description: Unauthorized
        '404':
          description: Not found

  /thoughts/{id}/tags:
    get:
      tags: [Thoughts]
      summary: Get tags for a thought
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        '401':
          description: Unauthorized

    post:
      tags: [Thoughts]
      summary: Replace all tags for a thought
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
      responses:
        '200':
          description: Updated thought
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thought'
        '401':
          description: Unauthorized

    delete:
      tags: [Thoughts]
      summary: Remove all tags from a thought
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated thought
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thought'
        '401':
          description: Unauthorized

  /thoughts/{id}/tags/{tagId}:
    put:
      tags: [Thoughts]
      summary: Add a tag to a thought
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated thought
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thought'
        '401':
          description: Unauthorized

    delete:
      tags: [Thoughts]
      summary: Remove a tag from a thought
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated thought
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thought'
        '401':
          description: Unauthorized

components:
  schemas:
    Thought:
      type: object
      properties:
        thoughtId:
          type: integer
        title:
          type: string
        body:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastFollowUp:
          type: string
          format: date-time
          nullable: true
        nextReminder:
          type: string
          format: date-time
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'

    Tag:
      type: object
      properties:
        tagId:
          type: integer
        name:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateThought:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string
        status:
          type: string
        nextReminder:
          type: string
          format: date-time

    UpdateThought:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        status:
          type: string
        nextReminder:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
