openapi: 3.0.0
info:
  title: Brainwave API - Tags
  version: 1.0.0
  description: Manage tags for thoughts. Tags are user-specific and can be independently managed.

tags:
  - name: Tag
    description: Simple words to be applied to thoughts to help in organization

paths:
  /tags/config:
    get:
      summary: Get tag configuration
      description: Returns system constraints for tag creation.
      tags:
        - Tag
      responses:
        '200':
          description: Tag configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagConfig'

  /tags:
    get:
      summary: Get all tags
      description: Get all tags the user has created
      tags:
        - Tag
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagClient'

    post:
      summary: Create a new tag
      description: Authenticated users can create tags.
      tags:
        - Tag
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagServerCreate'
      responses:
        '200':
          description: Created tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagClient'

  /tags/{id}:
    get:
      summary: Get a tag by ID
      tags:
        - Tag
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Tag ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tag object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagClient'

    patch:
      summary: Update a tag
      tags:
        - Tag
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Tag ID
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagServerUpdate'
      responses:
        '200':
          description: Updated tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagClient'

    delete:
      summary: Delete a tag
      tags:
        - Tag
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Tag ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagClient'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TagClient:
      type: object
      properties:
        tagId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - tagId
        - name
        - createdAt
        - updatedAt

    TagServerCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - name

    TagServerUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true

    TagConfig:
      type: object
      properties:
        minNameLength:
          type: integer
        maxNameLength:
          type: integer
        maxNotesLength:
          type: integer
      required:
        - minNameLength
        - maxNameLength
        - maxNotesLength
